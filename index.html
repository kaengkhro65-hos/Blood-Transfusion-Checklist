<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPG Checklist: การให้เลือด</title>
    <!-- Tailwind CSS สำหรับการจัดการ Layout และความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ฟอนต์สารบรรณ (Sarabun) -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- ไอคอนจาก Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom Checkbox Style */
        .custom-checkbox {
            appearance: none;
            background-color: #fff;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.5em;
            height: 1.5em;
            border: 2px solid #cbd5e1;
            border-radius: 0.35em;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .custom-checkbox::before {
            content: "";
            width: 0.85em;
            height: 0.85em;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
            transform: scale(0);
            transform-origin: bottom left;
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: white;
        }
        .custom-checkbox:checked {
            background-color: #ef4444; /* Red-500 */
            border-color: #ef4444;
        }
        .custom-checkbox:checked::before {
            transform: scale(1);
        }
        .checked-text {
            color: #9ca3af;
            text-decoration: line-through;
        }
    </style>
</head>
<body class="text-gray-800 pb-20">

    <!-- Header & Progress Bar -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="bg-red-600 text-white p-4 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i class="ph ph-drop text-2xl"></i>
                    Checklist การให้เลือด
                </h1>
                <p class="text-red-100 text-sm mt-1">PMK-WND-012</p>
            </div>
            <button onclick="resetChecklist()" class="bg-red-700 hover:bg-red-800 p-2 rounded-full transition-colors" title="เริ่มใหม่">
                <i class="ph ph-arrow-counter-clockwise text-xl"></i>
            </button>
        </div>
        <div class="p-4 bg-white border-b border-gray-200">
            <div class="flex justify-between text-sm font-semibold text-gray-600 mb-2 max-w-5xl mx-auto">
                <span>ความคืบหน้า (Progress) <span id="progress-count" class="text-xs text-gray-400 font-normal ml-1"></span></span>
                <span id="progress-text" class="text-red-600">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5 max-w-5xl mx-auto">
                <div id="progress-bar" class="bg-red-500 h-2.5 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>
        </div>
    </header>

    <!-- Main Content: 4 Cards Grid -->
    <main class="container mx-auto max-w-5xl p-4 grid grid-cols-1 md:grid-cols-2 gap-6 mt-4" id="checklist-container">
        <!-- Cards will be injected here via JavaScript -->
    </main>

    <!-- Modal for Messages (แทน alert) -->
    <div id="message-modal" class="fixed inset-0 bg-black bg-opacity-50 z-[100] flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl p-6 m-4 max-w-sm w-full transform scale-95 transition-transform duration-300" id="message-modal-content">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
                    <i class="ph ph-check text-2xl text-green-600"></i>
                </div>
                <h3 class="text-lg font-medium text-gray-900" id="modal-title">ล้างข้อมูลสำเร็จ</h3>
                <p class="text-sm text-gray-500 mt-2" id="modal-desc">เริ่มรายการเช็คลิสต์ใหม่เรียบร้อยแล้ว</p>
                <button onclick="closeModal()" class="mt-6 w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none sm:text-sm">
                    ตกลง
                </button>
            </div>
        </div>
    </div>

    <script>
        // ข้อมูล Checklist รวมทั้ง 4 การ์ด
        const checklistData = [
            {
                id: 'pre',
                title: '1. ก่อนให้เลือด (Pre-transfusion)',
                iconColor: 'text-blue-500',
                icon: 'ph-clipboard-text',
                isEmergency: false,
                items: [
                    { id: 'pre1', text: 'ตรวจสอบคำสั่งแพทย์ (Doctor order)' },
                    { id: 'pre2', text: 'ตรวจสอบความถูกต้องของผู้ป่วย (ชื่อ-สกุล, HN, ป้ายข้อมือ)' },
                    { id: 'pre3', text: 'ตรวจสอบเลือด (ชนิด, หมู่ ABO/Rh, วันหมดอายุ, Unit No.) ให้ตรงกับผู้ป่วยและใบขอเลือด' },
                    { id: 'pre4', text: 'วัดสัญญาณชีพ (V/S) ก่อนให้เลือดไม่เกิน 30 นาที (หาก T > 37.8°C ให้รายงานแพทย์)' },
                    { id: 'pre5', text: 'เตรียมอุปกรณ์ (Blood set) และ 0.9% NSS (ห้ามผสมยา/สารอื่น)' },
                    { id: 'pre6', text: 'อธิบายผู้ป่วย/ญาติ และล้างมือ+สวมถุงมือ' }
                ]
            },
            {
                id: 'during',
                title: '2. ขณะให้เลือด (During transfusion)',
                iconColor: 'text-orange-500',
                icon: 'ph-clock',
                isEmergency: false,
                items: [
                    { id: 'dur1', text: 'เริ่มให้เลือดช้าๆ (2-5 ml/min) ใน 15 นาทีแรก' },
                    { id: 'dur2', text: 'เฝ้าสังเกตอาการผู้ป่วยอย่างใกล้ชิดตลอด 15 นาทีแรก (เฝ้าระวังภาวะแพ้รุนแรง)' },
                    { id: 'dur3', text: 'วัดและบันทึกสัญญาณชีพ (V/S) ซ้ำ หลังเริ่มให้เลือด 15 นาที' },
                    { id: 'dur4', text: 'ปรับอัตราหยดตามแผนการรักษา (ปกติ 1 ยูนิต หมดภายใน 2-4 ชม.)' }
                ]
            },
            {
                id: 'post',
                title: '3. หลังให้เลือด (Post-transfusion)',
                iconColor: 'text-green-500',
                icon: 'ph-check-circle',
                isEmergency: false,
                items: [
                    { id: 'pos1', text: 'Flush สายด้วย 0.9% NSS เพื่อล้างเลือดในสายให้หมด' },
                    { id: 'pos2', text: 'วัดและบันทึกสัญญาณชีพ (V/S) หลังให้เลือดเสร็จทันที' },
                    { id: 'pos3', text: 'ทิ้งถุงเลือดและชุดให้เลือดลงในถังขยะติดเชื้ออย่างถูกต้อง' },
                    { id: 'pos4', text: 'บันทึกใน Nurse note (เวลาเริ่ม-หมด, ชนิด/ปริมาณเลือด, Unit No., อาการ)' }
                ]
            },
            {
                id: 'emergency',
                title: '4. กรณีฉุกเฉิน / ภาวะแทรกซ้อน',
                iconColor: 'text-red-600',
                icon: 'ph-warning-octagon',
                isEmergency: true,
                items: [
                    { id: 'em1', text: 'หยุดให้เลือดทันที! (Stop transfusion)' },
                    { id: 'em2', text: 'เปลี่ยนชุดสายน้ำเกลือใหม่ และให้ 0.9% NSS หยดช้าๆ (KVO)' },
                    { id: 'em3', text: 'ประเมิน V/S และรายงานแพทย์เวรทันที' },
                    { id: 'em4', text: 'ตรวจสอบป้ายเลือด ใบคล้องเลือด และข้อมูลผู้ป่วยซ้ำ' },
                    { id: 'em5', text: 'ส่งถุงเลือดที่เหลือพร้อมชุดสายให้เลือด คืนธนาคารเลือดเพื่อตรวจสอบ' }
                ]
            }
        ];

        // สถานะเก็บข้อมูล Checkbox
        let state = JSON.parse(localStorage.getItem('cpg_blood_state')) || {};

        // ฟังก์ชันเริ่มการทำงาน
        function init() {
            renderCards();
            updateProgress();
        }

        // สร้าง HTML สำหรับ Cards ทั้ง 4 ใบ
        function renderCards() {
            const container = document.getElementById('checklist-container');
            container.innerHTML = '';

            checklistData.forEach(section => {
                // กำหนด Theme สีของการ์ดแยกตามประเภท
                const cardBgClass = section.isEmergency ? 'bg-red-50 border-red-200 shadow-md' : 'bg-white border-gray-200 shadow-sm hover:shadow-md';
                const headerClass = section.isEmergency ? 'bg-red-100 text-red-800 border-red-200' : 'bg-gray-50 text-gray-800 border-gray-100';
                const contentBgClass = section.isEmergency ? 'bg-red-50/50' : 'bg-white';
                
                const cardEl = document.createElement('div');
                cardEl.className = `rounded-2xl border overflow-hidden flex flex-col h-full transition-shadow duration-300 ${cardBgClass}`;
                
                // Card Header
                const headerHtml = `
                    <div class="w-full p-4 flex items-center gap-3 font-bold border-b ${headerClass}">
                        <i class="ph-fill ${section.icon} text-2xl ${section.iconColor}"></i>
                        <span class="text-lg">${section.title}</span>
                    </div>
                `;

                // Card Items
                let itemsHtml = `<div class="p-5 space-y-4 flex-1 ${contentBgClass}">`;
                section.items.forEach(item => {
                    const isChecked = state[item.id] ? 'checked' : '';
                    const defaultTextClass = section.isEmergency ? 'text-gray-900 font-medium' : 'text-gray-700';
                    const textClass = state[item.id] ? 'checked-text' : defaultTextClass;
                    
                    itemsHtml += `
                        <label class="flex items-start gap-3 cursor-pointer group">
                            <div class="flex-shrink-0 mt-0.5">
                                <input type="checkbox" id="${item.id}" class="custom-checkbox" ${isChecked} onchange="toggleItem('${item.id}', ${!section.isEmergency})">
                            </div>
                            <span id="text-${item.id}" class="text-[15px] leading-relaxed select-none ${textClass} transition-colors duration-200">
                                ${item.text}
                            </span>
                        </label>
                    `;
                });
                itemsHtml += `</div>`;

                cardEl.innerHTML = headerHtml + itemsHtml;
                container.appendChild(cardEl);
            });
        }

        // จัดการคลิก Checkbox
        function toggleItem(id, isNormalItem) {
            const checkbox = document.getElementById(id);
            const textSpan = document.getElementById(`text-${id}`);
            
            state[id] = checkbox.checked;
            
            // อัปเดต CSS ข้อความ
            if (checkbox.checked) {
                textSpan.classList.add('text-gray-400', 'line-through', 'checked-text');
                textSpan.classList.remove('text-gray-700', 'text-gray-900', 'font-medium');
            } else {
                textSpan.classList.remove('text-gray-400', 'line-through', 'checked-text');
                if (isNormalItem) {
                    textSpan.classList.add('text-gray-700');
                } else {
                    textSpan.classList.add('text-gray-900', 'font-medium');
                }
            }

            saveState();
            if (isNormalItem) updateProgress();
        }

        // คำนวณความคืบหน้า (Progress Bar) - คำนวณเฉพาะรายการปกติ
        function updateProgress() {
            let total = 0;
            let checked = 0;

            checklistData.forEach(section => {
                if (!section.isEmergency) {
                    section.items.forEach(item => {
                        total++;
                        if (state[item.id]) checked++;
                    });
                }
            });

            const percentage = Math.round((checked / total) * 100);
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            
            progressBar.style.width = percentage + '%';
            progressText.innerText = percentage + '%';
            document.getElementById('progress-count').innerText = `(${checked}/${total})`;

            // เปลี่ยนสี Progress Bar เมื่อเต็ม 100%
            if (percentage === 100) {
                progressBar.classList.remove('bg-red-500');
                progressBar.classList.add('bg-green-500');
                progressText.classList.remove('text-red-600');
                progressText.classList.add('text-green-600');
            } else {
                progressBar.classList.remove('bg-green-500');
                progressBar.classList.add('bg-red-500');
                progressText.classList.remove('text-green-600');
                progressText.classList.add('text-red-600');
            }
        }

        // บันทึกสถานะลง LocalStorage
        function saveState() {
            try {
                localStorage.setItem('cpg_blood_state', JSON.stringify(state));
            } catch (e) {
                console.log('Local storage not supported.');
            }
        }

        // เริ่มใหม่ (Reset)
        function resetChecklist() {
            state = {};
            saveState();
            
            // Uncheck all UI boxes manually
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                cb.checked = false;
            });
            
            // Remove line-through classes and reset colors
            document.querySelectorAll('span[id^="text-"]').forEach(span => {
                span.classList.remove('text-gray-400', 'line-through', 'checked-text');
                if (span.id.startsWith('text-em')) {
                    span.classList.add('text-gray-900', 'font-medium');
                } else {
                    span.classList.add('text-gray-700');
                }
            });

            updateProgress();
            showModal('เริ่มใหม่เรียบร้อย', 'เคลียร์รายการเช็คลิสต์ทั้งหมดแล้ว คุณสามารถเริ่มทำใหม่ได้เลย');
        }

        // ระบบแจ้งเตือน (Modal)
        function showModal(title, desc) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            const modal = document.getElementById('message-modal');
            const content = document.getElementById('message-modal-content');
            
            modal.classList.remove('hidden');
            // Trigger reflow
            void modal.offsetWidth;
            
            modal.classList.add('opacity-100');
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
        }

        function closeModal() {
            const modal = document.getElementById('message-modal');
            const content = document.getElementById('message-modal-content');
            
            modal.classList.remove('opacity-100');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // เริ่มต้นการทำงานเมื่อโหลดเสร็จ
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
